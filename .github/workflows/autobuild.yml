name: Android Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[RUN]') || contains(github.event.head_commit.message, '[BUILD]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          bun install
          # Принудительно ставим dev-client, чтобы Expo собрал именно аналог Expo Go
          npx expo install expo-dev-client

      # Генерируем нативный код перед сборкой клиенского приложения
      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      # Собираем кастомный Expo Go под ваш проект
      - name: Build Custom Expo Go (Development Client)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Development Client APK
        uses: actions/upload-artifact@v4
        with:
          name: custom-expo-go-client
          path: android/app/build/outputs/apk/debug/app-debug.apk
